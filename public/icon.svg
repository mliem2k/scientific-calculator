<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- Display area -->
  <rect x="72" y="72" width="368" height="128" rx="16" fill="#18181b"/>

  <!-- Fraction line -->
  <rect x="172" y="126" width="168" height="8" rx="4" fill="#ffffff"/>
  <!-- Numerator "1" -->
  <text x="256" y="118" font-family="serif" font-size="52" font-weight="300" fill="#ffffff" text-anchor="middle" dominant-baseline="auto">1</text>
  <!-- Denominator "2" -->
  <text x="256" y="180" font-family="serif" font-size="52" font-weight="300" fill="#ffffff" text-anchor="middle" dominant-baseline="hanging">2</text>

  <!-- Button rows -->
  <!-- Row 1 -->
  <rect x="72"  y="232" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="156" y="232" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="240" y="232" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="324" y="232" width="116" height="52" rx="10" fill="#1d4ed8"/>

  <!-- Row 2 -->
  <rect x="72"  y="296" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="156" y="296" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="240" y="296" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="324" y="296" width="116" height="52" rx="10" fill="#3f3f46"/>

  <!-- Row 3 -->
  <rect x="72"  y="360" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="156" y="360" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="240" y="360" width="72" height="52" rx="10" fill="#18181b"/>
  <rect x="324" y="360" width="116" height="52" rx="10" fill="#3f3f46"/>

  <!-- Row 4 -->
  <rect x="72"  y="424" width="72" height="56" rx="10" fill="#18181b"/>
  <rect x="156" y="424" width="72" height="56" rx="10" fill="#18181b"/>
  <rect x="240" y="424" width="72" height="56" rx="10" fill="#18181b"/>
  <rect x="324" y="424" width="116" height="56" rx="10" fill="#3f3f46"/>
</svg>
