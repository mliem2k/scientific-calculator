    <text x="163" y="233" text-anchor="middle" font-size="20" font-family="monospace" fill="#ffffff">cos</text>
    <rect x="216" y="192" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="257" y="233" text-anchor="middle" font-size="20" font-family="monospace" fill="#ffffff">tan</text>
    <rect x="310" y="192" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="351" y="233" text-anchor="middle" font-size="20" font-family="monospace" fill="#ffffff">log</text>
    <rect x="404" y="192" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="445" y="235" text-anchor="middle" font-size="28" font-family="sans-serif" fill="#ffffff">√</text>

    <!-- Row 2 -->
    <rect x="28"  y="268" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="69"  y="313" text-anchor="middle" font-size="36" font-family="sans-serif" fill="#ffffff">7</text>
    <rect x="122" y="268" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="163" y="313" text-anchor="middle" font-size="36" font-family="sans-serif" fill="#ffffff">8</text>
    <rect x="216" y="268" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="257" y="313" text-anchor="middle" font-size="36" font-family="sans-serif" fill="#ffffff">9</text>
    <rect x="310" y="268" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="351" y="310" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#ef4444">DEL</text>
    <rect x="404" y="268" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="445" y="310" text-anchor="middle" font-size="22" font-family="sans-serif" fill="#ef4444">AC</text>

    <!-- Row 3 -->
    <rect x="28"  y="344" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="69"  y="389" text-anchor="middle" font-size="36" font-family="sans-serif" fill="#ffffff">4</text>
    <rect x="122" y="344" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="163" y="389" text-anchor="middle" font-size="36" font-family="sans-serif" fill="#ffffff">5</text>
    <rect x="216" y="344" width="82" height="66" rx="9" fill="#1c1c1c"/>
    <text x="257" y="389" text-anchor="middle" font-size="36" font-family="sans-serif" fill="#ffffff">6</text>
