<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Transparent background. Content scaled to 1.22× and centered so it
       sits within the adaptive icon safe zone (66dp of 108dp frame). -->
  <g transform="translate(200, 200) scale(1.22)">
